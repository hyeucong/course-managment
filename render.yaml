services:
  - type: web
    name: course-managment
    env: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    releaseCommand: php artisan migrate --force && php artisan storage:link
    autoDeploy: true
    envVars: []
